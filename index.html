        /* ═══════════════════════════════════════════════
      DESIGN TOKENS

    :root {
      --primary:      #76B4F2;
      --primary-dark: #4A8ED8;
      --primary-deep: #1A5FAA;
      --primary-pale: #C4DDF9;
      --primary-wash: #EBF4FD;
      --secondary:    #312E57;
      --secondary-mid:#4A4580;
      --secondary-lt: #6B66A8;
      --accent:       #D04F6D;
      --accent-dark:  #A83050;
      --accent-pale:  #F9D5DD;
      --white:        #FFFFFF;
      --gray:         #A2A2B5;
      --gray-light:   #E8E8F0;
      --gray-bg:      #F4F6FB;
      --ink:          #1A1830;

      --ff-display: 'Unbounded', sans-serif;
      --ff-body:    'Inter', sans-serif;

      --ease-out: cubic-bezier(0.22,1,0.36,1);
      --ease-in:  cubic-bezier(0.64,0,0.78,0);

      --r-sm: 6px;
      --r:    12px;
      --r-lg: 20px;
      --r-xl: 32px;

      --shadow-sm: 0 2px 8px rgba(49,46,87,0.08);
      --shadow-md: 0 8px 32px rgba(49,46,87,0.12);
      --shadow-lg: 0 20px 60px rgba(49,46,87,0.15);
      --shadow-xl: 0 32px 80px rgba(49,46,87,0.2);
    }

    

    /* ═══════════════════════════════════════════════
      CUSTOM CURSOR
    ═══════════════════════════════════════════════ */
    .cursor{position:fixed;top:0;left:0;z-index:9999;pointer-events:none;mix-blend-mode:normal}
    .c-dot{
      position:absolute;width:8px;height:8px;
      background:var(--accent);border-radius:50%;
      transform:translate(-50%,-50%);
      transition:width .15s,height .15s;
    }
    .c-ring{
      position:absolute;width:40px;height:40px;
      border:1.5px solid rgba(118,180,242,0.5);
      border-radius:50%;
      transform:translate(-50%,-50%);
      transition:width .35s var(--ease-out),height .35s var(--ease-out),border-color .25s;
    }
    body:has(a:hover) .c-ring,
    body:has(button:hover) .c-ring{
      width:60px;height:60px;border-color:rgba(208,79,109,0.6);
    }
